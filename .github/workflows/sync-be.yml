name: Sync BE to Alice-BE

on:
  push:
    branches: [main]
    paths:
      - 'packages/adapter-bedrock/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to Alice-BE sub-repo
        run: |
          git config user.name "Alice Mod Bot"
          git config user.email "bot@alice-mod.dev"

          # 提取 BE 子目录历史
          git subtree split --prefix=packages/adapter-bedrock \
            -b be-temp-${{ github.sha }}

          # 推送到 Alice-BE 子仓库
          git push \
            https://x-access-token:${{ secrets.SUBREPO_PAT }}@github.com/copper-lamp/Alice-BE.git \
            be-temp-${{ github.sha }}:main \
            --force

      - name: Trigger Alice-BE release
        if: startsWith(github.ref, 'refs/tags/be/')
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.SUBREPO_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/copper-lamp/Alice-BE/dispatches \
            -d "{\"event_type\":\"release\",\"client_payload\":{\"tag\":\"${{ github.ref_name }}\"}}"
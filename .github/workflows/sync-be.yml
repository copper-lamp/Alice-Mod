name: Sync BE to Alice-BE

on:
  push:
    branches: [main]
    paths:
      - 'packages/adapter-bedrock/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: copper-lamp/Alice-BE
          path: target-repo
          token: ${{ secrets.SUBREPO_PAT }}

      - name: Sync files to Alice-BE
        working-directory: target-repo
        run: |
          git config user.name "Alice Mod Bot"
          git config user.email "bot@alice-mod.dev"

          rm -rf ./*
          cp -r ${{ github.workspace }}/packages/adapter-bedrock/* ./
          cp ${{ github.workspace }}/packages/adapter-bedrock/.* ./ 2>/dev/null || true

          git add -A
          git diff --quiet --cached || git commit -m "sync: update from Alice-Mod @ ${{ github.sha }}"
          git push origin ${{ github.ref_name }} --force
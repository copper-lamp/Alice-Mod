# ============================================================
# Sync JE to Alice-JE
# 
# 触发时机:
#   1. main 分支推送, 且 packages/adapter-java/** 有变更
#   2. 推送 je/v* 标签时
#
# 行为:
#   - 分支推送: 同步源码到 Alice-JE 仓库对应分支
#   - 标签推送: 同步源码 + 推送剥离前缀的标签到 Alice-JE,
#               触发 Alice-JE 的发布工作流 (Matrix 构建所有 MC 版本)
# ============================================================
name: Sync JE to Alice-JE

on:
  push:
    branches:
      - 'main'
    tags:
      - 'je/v*'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: copper-lamp/Alice-JE
          path: target-repo
          token: ${{ secrets.SUBREPO_PAT }}

      - name: Determine target branch
        id: branch
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "branch=main" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Sync files to Alice-JE
        working-directory: target-repo
        env:
          TARGET_BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          git config user.name "Alice Mod Bot"
          git config user.email "bot@alice-mod.dev"

          git checkout "$TARGET_BRANCH" 2>/dev/null || git checkout -b "$TARGET_BRANCH"

          # 保留子仓库独有的文件（release.yml）
          mkdir -p /tmp/je-sync-backup
          cp .github/workflows/release.yml /tmp/je-sync-backup/release.yml 2>/dev/null || true

          # 清空并复制 JE 源码
          rm -rf ./*
          cp -r ${{ github.workspace }}/packages/adapter-java/* ./
          cp ${{ github.workspace }}/packages/adapter-java/.* ./ 2>/dev/null || true

          # 恢复子仓库独有的文件
          mkdir -p .github/workflows
          cp /tmp/je-sync-backup/release.yml .github/workflows/release.yml 2>/dev/null || true

          git add -A
          git diff --quiet --cached || git commit -m "sync: update from Alice-Mod @ ${{ github.sha }}"
          git push "https://x-access-token:${{ secrets.SUBREPO_PAT }}@github.com/copper-lamp/Alice-JE.git" "$TARGET_BRANCH"

      - name: Push tag to Alice-JE
        if: github.ref_type == 'tag'
        working-directory: target-repo
        run: |
          TAG="${{ github.ref_name }}"
          # 去掉 je/ 前缀: je/v1.0.0 → v1.0.0
          STRIPPED_TAG="${TAG#je/}"
          git tag -f "$STRIPPED_TAG"
          git push "https://x-access-token:${{ secrets.SUBREPO_PAT }}@github.com/copper-lamp/Alice-JE.git" "refs/tags/$STRIPPED_TAG"
          echo "Pushed tag '$STRIPPED_TAG' to Alice-JE (from '$TAG')"

      - name: Trigger Alice-JE release (via repository_dispatch)
        if: github.ref_type == 'tag'
        run: |
          STRIPPED_TAG="${GITHUB_REF_NAME#je/}"
          curl --fail -X POST \
            -H "Authorization: Bearer ${{ secrets.SUBREPO_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/copper-lamp/Alice-JE/dispatches \
            -d "{\"event_type\":\"release\",\"client_payload\":{\"tag\":\"$STRIPPED_TAG\"}}"

name: Sync JE to Alice-JE

on:
  push:
    branches: [main]
    paths:
      - 'packages/adapter-java/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: copper-lamp/Alice-JE
          path: target-repo
          token: ${{ secrets.SUBREPO_PAT }}

      - name: Sync files to Alice-JE
        working-directory: target-repo
        run: |
          git config user.name "Alice Mod Bot"
          git config user.email "bot@alice-mod.dev"

          # 保留子仓库独有的文件（versions.json、release.yml 等）
          cp .github/workflows/release.yml /tmp/release.yml 2>/dev/null || true
          cp versions.json /tmp/versions.json 2>/dev/null || true

          rm -rf ./*
          cp -r ${{ github.workspace }}/packages/adapter-java/* ./
          cp ${{ github.workspace }}/packages/adapter-java/.* ./ 2>/dev/null || true

          # 恢复子仓库独有的文件
          cp /tmp/release.yml .github/workflows/release.yml 2>/dev/null || true
          cp /tmp/versions.json ./versions.json 2>/dev/null || true

          git add -A
          git diff --quiet --cached || git commit -m "sync: update from Alice-Mod @ ${{ github.sha }}"
          git push origin ${{ github.ref_name }} --force

      - name: Trigger Alice-JE release
        if: startsWith(github.ref, 'refs/tags/je/')
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.SUBREPO_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/copper-lamp/Alice-JE/dispatches \
            -d "{\"event_type\":\"release\",\"client_payload\":{\"tag\":\"${{ github.ref_name }}\"}}"
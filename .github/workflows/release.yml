name: Release

on:
  push:
    tags:
      - 'ac/v*'
      - 'je/v*'
      - 'be/v*'

permissions:
  contents: write

jobs:
  detect-component:
    runs-on: ubuntu-latest
    outputs:
      component: ${{ steps.detect.outputs.component }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - id: detect
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ "$TAG" == ac/* ]]; then echo "component=ac" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == je/* ]]; then echo "component=je" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == be/* ]]; then echo "component=be" >> $GITHUB_OUTPUT
          fi
          VERSION="${TAG#*/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # 为 AC 创建 GitHub Release（仅用于在父仓库中记录发布）
  create-release:
    needs: detect-component
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
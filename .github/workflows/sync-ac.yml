name: Sync AC to Alice-App

on:
  push:
    branches: [main, preview]
    tags:
      - 'ac/v*'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if AC files changed
        id: check
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # 标签推送：总是同步
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "reason=tag" >> $GITHUB_OUTPUT
          else
            # 分支推送：检查 files changed
            CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
            for PATTERN in "packages/agent-core/" "packages/shared/" "pnpm-workspace.yaml" "package.json" "pnpm-lock.yaml"; do
              if echo "$CHANGED" | grep -qE "^$PATTERN"; then
                echo "changed=true" >> $GITHUB_OUTPUT
                echo "reason=paths matched" >> $GITHUB_OUTPUT
                exit 0
              fi
            done
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "reason=no matching files changed" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.changed == 'true'
        with:
          repository: copper-lamp/Alice-App
          path: target-repo
          token: ${{ secrets.SUBREPO_PAT }}

      - name: Determine target branch
        if: steps.check.outputs.changed == 'true'
        id: branch
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            [[ "$TAG" == *-preview* ]] && echo "branch=preview" >> $GITHUB_OUTPUT || echo "branch=main" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Sync files to Alice-App
        if: steps.check.outputs.changed == 'true'
        working-directory: target-repo
        env:
          SYNC_BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          git config user.name "Alice Mod Bot"
          git config user.email "bot@alice-mod.dev"

          git checkout "$SYNC_BRANCH" 2>/dev/null || git checkout -b "$SYNC_BRANCH"

          # 保留 .git 和 .github（子仓库的 release.yml）
          ls -A1 | grep -vE '^\.git$|^\.github$' | xargs -I{} rm -rf {} 2>/dev/null || true

          # 复制 AC 代码
          cp -r ${{ github.workspace }}/packages/agent-core/* ./

          # 复制 shared 包（agent-core 依赖 @mcagent/shared: workspace:*）
          mkdir -p packages
          cp -r ${{ github.workspace }}/packages/shared ./packages/shared

          # 复制 monorepo 根级文件（不复制 pnpm-lock.yaml: agent-core package.json 与根级 lockfile 不匹配）
          cp ${{ github.workspace }}/pnpm-workspace.yaml ./ 2>/dev/null || true
          cp ${{ github.workspace }}/.npmrc ./ 2>/dev/null || true
          cp ${{ github.workspace }}/tsconfig.json ./ 2>/dev/null || true

          # 子仓库 release.yml 已配置为纯 Windows 构建，无需修改

          git add -A
          git diff --quiet --cached || git commit -m "sync: update from Alice-Mod @ ${{ github.sha }}"
          git push origin "$SYNC_BRANCH" --force || echo "WARN: push failed (may be concurrent with another sync)"

      - name: Trigger Alice-App release
        if: steps.check.outputs.changed == 'true' && github.ref_type == 'tag' && startsWith(github.ref_name, 'ac/')
        run: |
          TAG=${{ github.ref_name }}
          CHANNEL="stable"
          [[ "$TAG" == *-preview* ]] && CHANNEL="beta"

          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.SUBREPO_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/copper-lamp/Alice-App/dispatches \
            -d "{\"event_type\":\"release\",\"client_payload\":{\"tag\":\"$TAG\",\"channel\":\"$CHANNEL\"}}"